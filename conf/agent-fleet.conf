# tmux-agent-fleet — isolated tmux config
#
# Loaded ONLY by the agent-fleet tmux server
# (tmux -L agent-fleet -f /path/to/this/file ...). It does NOT affect your
# normal tmux server or ~/.tmux.conf.

# --- Server ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -sg escape-time 0
set -g focus-events on

# --- Session ---
set -g history-limit 10000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
# When a workspace's last tab closes, drop onto the last active workspace instead
# of detaching (the jarring default when Ctrl-D closes your final tab).
set -g detach-on-destroy off
# Keep window names stable: don't let the running command (e.g. the Claude
# binary's version) rename the tab or clobber names set by `agent-fleet add`.
setw -g automatic-rename off
set -g allow-rename off

# --- Prefix ---
# The fleet runs on its own socket, so this can't conflict with your daily
# tmux even if both use C-a. Override in local.conf if you prefer.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- The one surface: the fleet picker ---
# Prefix o opens the single fzf popup (jump / search / connect). Requires
# AGENT_FLEET_ROOT in the server env; the CLI exports it on boot.
bind o display-popup -E -w 85% -h 80% "$AGENT_FLEET_ROOT/scripts/pick.sh"

# Jump back to the previous WORKSPACE (session-level last).
bind L switch-client -l

# Jump back to the previously focused AGENT/pane — works across windows and
# workspaces (plain tmux last-pane is same-window only). Pressing it again
# toggles between the two. Focus history is kept by the pane-focus-in hook below.
bind Tab run-shell "$AGENT_FLEET_ROOT/bin/agent-fleet back"

# Toggle the ambient sidenav rail (show/hide) in the current window.
bind b run-shell "$AGENT_FLEET_ROOT/scripts/sidenav-toggle.sh '#{window_id}' '#{pane_id}'"

# Prefix c keeps tmux's default: a plain shell window in the current dir.
# Prefix C quick-adds a Claude agent (with the fleet status hooks) to the
# current workspace and jumps to it — the in-UI alternative to `agent-fleet add`.
bind c new-window -c "#{pane_current_path}"
bind C run-shell "'$AGENT_FLEET_ROOT/bin/agent-fleet' add --focus >/dev/null"

# Force a repaint of the focused pane (fixes a stale Claude frame on the spot).
# Backgrounded so the resize round-trip's sleep doesn't block the server.
bind R run-shell -b "$AGENT_FLEET_ROOT/scripts/redraw.sh '#{pane_id}' '#{@fleet-sidenav}'"

# Make the rail clickable: a left-click inside a rail pane focuses the clicked
# agent/workspace; clicks in any other pane keep tmux's default behavior.
bind -n MouseDown1Pane if-shell -F '#{@fleet-sidenav}' \
  "run-shell \"$AGENT_FLEET_ROOT/scripts/sidenav-click.sh '#{pane_id}' '#{mouse_y}'\"" \
  "select-pane -t = ; send-keys -M"

# Open the sidenav by default: auto-add the rail to new windows/sessions and on
# attach. Set @fleet-sidenav-auto off (e.g. in local.conf) to opt out; Prefix b
# still toggles per window either way.
set -g @fleet-sidenav-auto on
set-hook -g after-new-window  "run-shell \"$AGENT_FLEET_ROOT/scripts/sidenav-toggle.sh '#{window_id}' '#{pane_id}' ensure\""
set-hook -g after-new-session "run-shell \"$AGENT_FLEET_ROOT/scripts/sidenav-toggle.sh '#{window_id}' '#{pane_id}' ensure\""
set-hook -g client-attached   "run-shell \"$AGENT_FLEET_ROOT/scripts/sidenav-toggle.sh '#{window_id}' '#{pane_id}' ensure\""

# When a pane exits (e.g. Ctrl-D): if other work panes remain, only that pane
# closes; once just the rail is left, close the tab (and, if it was the last tab,
# the workspace — detach-on-destroy=off then lands you on the last active one).
set-hook -g pane-exited "run-shell -b \"$AGENT_FLEET_ROOT/scripts/sidenav-reap.sh '#{window_id}'\""

# Record focus history for Prefix Tab ("jump back") on every focus change
# (window/session/pane switch; focus-events is on). The recorder skips rail panes.
set-hook -g pane-focus-in "run-shell \"$AGENT_FLEET_ROOT/scripts/focus-track.sh '#{pane_id}' '#{@fleet-sidenav}'\""

# Rename the current workspace (session) / tab (window). Pre-filled with the
# current name; edit and Enter. Workspace rename routes through the CLI so
# agents named after the workspace follow the new name.
bind W command-prompt -I "#S" -p "rename workspace" \
  { run-shell "'$AGENT_FLEET_ROOT/bin/agent-fleet' rename-workspace '#S' '%%'" }
bind T command-prompt -I "#W" -p "rename tab" { rename-window -- "%%" }

# --- Quality-of-life binds ---
bind r source-file "$AGENT_FLEET_ROOT/conf/agent-fleet.conf" \; display-message "agent-fleet config reloaded"
# Close the current tab in one shot (even with several panes open).
bind & confirm-before -p "close tab #W? (y/n)" kill-window
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Re-tile the work panes sensibly (rail preserved): side-by-side -> even-horizontal,
# stacked -> even-vertical, mixed -> tiled.
bind = run-shell "$AGENT_FLEET_ROOT/scripts/sidenav-relayout.sh '#{window_id}' '#{pane_id}'"
# Window/agent jumps use tmux's built-in Prefix 1..9.

# --- Theme: Tokyo Night ---
# bg #1a1b26 · surface #292e42 · fg #c0caf5 · muted #565f89
# blue #7aa2f7 · green #9ece6a · yellow #e0af68 · red #f7768e
set -g status on
set -g status-interval 3
set -g status-position top
set -g status-justify left
set -g status-style "bg=#1a1b26,fg=#c0caf5"
# Left segment is a fixed-width "cap" sized to the sidenav (30 cols) + a border
# separator aligned to the rail's right edge, so the bar reads as the rail's
# header rather than spanning over it. Window tabs then start above the work pane.
set -g status-left-length 40
set -g status-left "#[bg=#1a1b26,fg=#7aa2f7,bold] FLEET                        #[fg=#3b4261,nobold]│#[default] "
# Right side mirrors the sidenav's agent awareness: live ⚠wait/⏳working/✓done counts.
set -g status-right-length 80
set -g status-right "#($AGENT_FLEET_ROOT/scripts/status.sh summary)#[fg=#565f89] %H:%M "

setw -g window-status-current-style "bg=#7aa2f7,fg=#1a1b26,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-style "fg=#565f89"
setw -g window-status-format " #I:#W "

# Command prompt + copy-mode selection
set -g message-style "bg=#292e42,fg=#c0caf5"
set -g mode-style "bg=#292e42,fg=#c0caf5"

# Pane borders
set -g pane-border-style "fg=#292e42"
set -g pane-active-border-style "fg=#7aa2f7"

# fzf popup (the picker)
set -g popup-border-style "fg=#7aa2f7"
set -g popup-border-lines rounded

# --- User overrides ---
# Personal binds/theme go in ~/.config/agent-fleet/local.conf, sourced last.
if-shell '[ -f "$HOME/.config/agent-fleet/local.conf" ]' \
  'source-file "$HOME/.config/agent-fleet/local.conf"'
