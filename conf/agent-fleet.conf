# tmux-agent-fleet — isolated tmux config
#
# Loaded ONLY by the agent-fleet tmux server
# (tmux -L agent-fleet -f /path/to/this/file ...). It does NOT affect your
# normal tmux server or ~/.tmux.conf.

# --- Server ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -sg escape-time 0
set -g focus-events on
# Claude Code integration: the fleet synthesizes OSC 9;4 progress sequences,
# DCS-wrapped for tmux — passthrough lets them reach the outer terminal
# (Ghostty/iTerm2/WezTerm render a loading bar).
# Deliberately NOT set: `extended-keys on` + the extkeys terminal-feature
# (Anthropic's guidance suggests them for Shift+Enter fidelity, but the
# modifyOtherKeys/CSI-u negotiation with the outer terminal garbles paste in
# vim and other TUIs that do their own key-protocol negotiation).
%if #{>=:#{version},3.3}
set -g allow-passthrough on
%endif

# --- Session ---
# Shell panes start via pane-shell.sh: it puts the repo's claude shim on PATH
# (hand-started `claude`/`claude -r` then gets the status hooks + session-id
# capture that resume-after-reboot needs) and execs your login shell.
# Explicit-command panes (agents) bypass default-command entirely.
set -g default-command "$AGENT_FLEET_ROOT/scripts/pane-shell.sh"
set -g history-limit 10000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
# When a workspace's last tab closes, drop onto the last active workspace instead
# of detaching (the jarring default when Ctrl-D closes your final tab).
set -g detach-on-destroy off
# Keep window names stable: don't let the running command (e.g. the Claude
# binary's version) rename the tab or clobber names set by `agent-fleet add`.
setw -g automatic-rename off
set -g allow-rename off

# --- Prefix ---
# The fleet runs on its own socket, so this can't conflict with your daily
# tmux even if both use C-a. Override in local.conf if you prefer.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# --- The one surface: the fleet picker ---
# Prefix o opens the single fzf popup (jump / search / connect). Requires
# AGENT_FLEET_ROOT in the server env; the CLI exports it on boot.
bind o display-popup -E -w 85% -h 80% "$AGENT_FLEET_ROOT/scripts/pick.sh"
# Prefix w opens the picker straight to the workspace switcher (every workspace,
# including shell-only ones) — a quick workspace jump on top of the agent jump.
bind w display-popup -E -w 85% -h 80% "$AGENT_FLEET_ROOT/scripts/pick.sh spaces"
# Prefix g opens the picker straight to the cloud view (your GitHub Codespaces).
bind g display-popup -E -w 85% -h 80% "$AGENT_FLEET_ROOT/scripts/pick.sh cloud"
# Prefix f opens the picker straight to the connect view — search recent folders
# (zoxide frecency, git repos first) to spawn a new workspace.
bind f display-popup -E -w 85% -h 80% "$AGENT_FLEET_ROOT/scripts/pick.sh connect"

# Jump back to the previous WORKSPACE (session-level last).
bind L switch-client -l

# Prefix Space — triage jump: go to the next agent that needs you (wait → done),
# cycling the queue. Repeated presses walk everyone waiting on you; if you're not
# on a queued agent it lands on the most urgent. (Replaces tmux's next-layout,
# which is covered by Prefix =.)
bind Space run-shell "$AGENT_FLEET_ROOT/scripts/next-attention.sh '#{pane_id}'"

# Jump back to the previously focused AGENT/pane — works across windows and
# workspaces (plain tmux last-pane is same-window only). Pressing it again
# toggles between the two. Focus history is kept by the pane-focus-in hook below.
bind Tab run-shell "$AGENT_FLEET_ROOT/bin/agent-fleet back"

# Toggle the ambient sidenav rail (show/hide) in the current window.
bind b run-shell "$AGENT_FLEET_ROOT/scripts/sidenav-toggle.sh '#{window_id}' '#{pane_id}'"

# Prefix c keeps tmux's default: a plain shell window in the current dir.
# Prefix C adds a Claude agent (with the fleet status hooks) and lets you pick
# where it lands — a new tab in this workspace, or a brand-new workspace (prompts
# for a name). Either way it starts in the current pane's dir and jumps to it.
bind c new-window -c "#{pane_current_path}"
# #{q:...} shell-escapes format expansions (apostrophes in paths). Typed names
# never touch sh directly: command-prompt stores %% in a tmux option (a tmux
# command, not a shell — $/backticks are inert there), and the run-shell reads
# it back via the CLI's internal _prompt verb. Interpolating %% into any
# quoted sh string would execute $(...) typed at the prompt.
bind C display-menu -T "#[align=centre] add claude agent " \
  "new tab (this workspace)" n { run-shell "'$AGENT_FLEET_ROOT/bin/agent-fleet' add --dir #{q:pane_current_path} --focus >/dev/null" } \
  "new workspace…"           w { command-prompt -p "workspace name:" { set -g @fleet-prompt "%%" ; run-shell "'$AGENT_FLEET_ROOT/bin/agent-fleet' add --new-workspace \"\$('$AGENT_FLEET_ROOT/bin/agent-fleet' _prompt)\" --dir #{q:pane_current_path} --focus >/dev/null" } }

# Force a repaint of the focused pane (fixes a stale Claude frame on the spot).
# Backgrounded so the resize round-trip's sleep doesn't block the server.
bind R run-shell -b "$AGENT_FLEET_ROOT/scripts/redraw.sh '#{pane_id}' '#{@fleet-sidenav}'"

# Make the rail clickable: a left-click inside a rail pane focuses the clicked
# agent/workspace; clicks in any other pane keep tmux's default behavior.
bind -n MouseDown1Pane if-shell -F '#{@fleet-sidenav}' \
  "run-shell \"$AGENT_FLEET_ROOT/scripts/sidenav-click.sh '#{pane_id}' '#{mouse_y}'\"" \
  "select-pane -t = ; send-keys -M"

# Open the sidenav by default: auto-add the rail to new windows/sessions and on
# attach. Set @fleet-sidenav-auto off (e.g. in local.conf) to opt out; Prefix b
# still toggles per window either way.
set -g @fleet-sidenav-auto on
set-hook -g after-new-window  "run-shell \"$AGENT_FLEET_ROOT/scripts/sidenav-toggle.sh '#{window_id}' '#{pane_id}' ensure\""
set-hook -g after-new-session "run-shell \"$AGENT_FLEET_ROOT/scripts/sidenav-toggle.sh '#{window_id}' '#{pane_id}' ensure\""
set-hook -g client-attached   "run-shell \"$AGENT_FLEET_ROOT/scripts/sidenav-toggle.sh '#{window_id}' '#{pane_id}' ensure\""

# When a pane exits (e.g. Ctrl-D): if other work panes remain, only that pane
# closes; once just the rail is left, close the tab (and, if it was the last tab,
# the workspace — detach-on-destroy=off then lands you on the last active one).
set-hook -g pane-exited "run-shell -b \"$AGENT_FLEET_ROOT/scripts/sidenav-reap.sh '#{window_id}'\""

# Record focus history for Prefix Tab ("jump back") on every focus change
# (window/session/pane switch; focus-events is on), and push the new current
# view to the rails so the highlight moves instantly (session/window are
# format-expanded here — no extra forks in the recorder). Skips rail panes.
set-hook -g pane-focus-in "run-shell \"$AGENT_FLEET_ROOT/scripts/focus-track.sh '#{pane_id}' '#{@fleet-sidenav}' #{q:session_name} '#{window_id}'\""

# Rename the current workspace (session) / tab (window). Pre-filled with the
# current name; edit and Enter. Workspace rename routes through the CLI so
# agents named after the workspace follow the new name.
bind W command-prompt -I "#S" -p "rename workspace" \
  { set -g @fleet-prompt "%%" ; run-shell "'$AGENT_FLEET_ROOT/bin/agent-fleet' rename-workspace #{q:session_name} \"\$('$AGENT_FLEET_ROOT/bin/agent-fleet' _prompt)\"" }
bind T command-prompt -I "#W" -p "rename tab" { rename-window -- "%%" }

# --- Quality-of-life binds ---
# $AGENT_FLEET_CONF is exported by every server launcher (CLI, persist-restore)
# and expanded at parse time, so reload honors a custom-conf override.
bind r source-file "$AGENT_FLEET_CONF" \; display-message "agent-fleet config reloaded"
# Close the current tab in one shot (even with several panes open).
bind & confirm-before -p "close tab #W? (y/n)" kill-window
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Re-tile the work panes sensibly (rail preserved): side-by-side -> even-horizontal,
# stacked -> even-vertical, mixed -> tiled.
bind = run-shell "$AGENT_FLEET_ROOT/scripts/sidenav-relayout.sh '#{window_id}' '#{pane_id}'"
# Window/agent jumps use tmux's built-in Prefix 1..9.

# --- Theme: Tokyo Night ---
# bg #1a1b26 · surface #292e42 · fg #c0caf5 · muted #565f89
# blue #7aa2f7 · green #9ece6a · yellow #e0af68 · red #f7768e
set -g status on
set -g status-interval 3
set -g status-position top
set -g status-justify left
set -g status-style "bg=#1a1b26,fg=#c0caf5"
# Left segment is a fixed-width "cap" sized to the sidenav (30 cols) + a border
# separator aligned to the rail's right edge, so the bar reads as the rail's
# header rather than spanning over it. Window tabs then start above the work pane.
set -g status-left-length 40
set -g status-left "#[bg=#1a1b26,fg=#7aa2f7,bold] FLEET                        #[fg=#3b4261,nobold]│#[default] "
# Right side mirrors the sidenav's agent awareness: live wait/working/done
# counts, in the rail's glyph vocabulary (red ●, braille spinner, green ●).
set -g status-right-length 80
set -g status-right "#($AGENT_FLEET_ROOT/scripts/status.sh summary)#[fg=#565f89] %H:%M "

setw -g window-status-current-style "bg=#7aa2f7,fg=#1a1b26,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-style "fg=#565f89"
setw -g window-status-format " #I:#W "

# Command prompt + copy-mode selection
set -g message-style "bg=#292e42,fg=#c0caf5"
set -g mode-style "bg=#292e42,fg=#c0caf5"

# Pane borders
set -g pane-border-style "fg=#292e42"
# The active-pane indicator exists only where it answers a question. Unsplit
# windows (rail + one work pane) get a dim divider — focus never moves, so an
# accent is noise. Split windows get border ARROWS pointing at the active pane
# plus the accent: color alone can't say which side of a shared border is
# active. border-tune.sh sets both per window from the real work-pane count
# (hooks: after-split-window here, every pane exit via sidenav-reap); these
# globals are the pre-tune defaults for fresh windows (window_panes > 2 ≈
# rail + ≥2 work panes). Style formats need tmux ≥ 3.4.
set -g pane-border-indicators colour
%if #{>=:#{version},3.4}
set -g pane-active-border-style '#{?#{e|>:#{window_panes},2},fg=#7aa2f7,fg=#292e42}'
%else
set -g pane-active-border-style "fg=#7aa2f7"
%endif
set-hook -g after-split-window "run-shell -b \"$AGENT_FLEET_ROOT/scripts/border-tune.sh '#{window_id}'\""

# fzf popup (the picker)
set -g popup-border-style "fg=#7aa2f7"
set -g popup-border-lines rounded

# --- User overrides ---
# Personal binds/theme go in ~/.config/agent-fleet/local.conf, sourced last.
if-shell '[ -f "$HOME/.config/agent-fleet/local.conf" ]' \
  'source-file "$HOME/.config/agent-fleet/local.conf"'
